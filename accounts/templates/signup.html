{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - ReadWise</title>
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="logo">
                <h2>ReadWise</h2>
            </div>
            <form id="signup-form" class="login-form">
                <div class="form-group">
                    <input type="text" 
                           id="name" 
                           placeholder="Full Name" 
                           required
                           minlength="2"
                           aria-label="Full Name">
                </div>
                <div class="form-group">
                    <input type="email" 
                           id="email" 
                           placeholder="Email Address" 
                           required
                           pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$"
                           aria-label="Email Address">
                <div class="form-group password-group">
    <input type="password" 
           id="password" 
           placeholder="Password" 
           required
           minlength="8"
           aria-label="Password">
    <i class="fa fa-eye toggle-password" toggle="#password"></i>
</div>

    <div class="form-group password-group">
    <input type="password" 
           id="confirm-password" 
           placeholder="Confirm Password"
           required
           minlength="8"
           aria-label="Confirm Password">
    <i class="fa fa-eye toggle-password" toggle="#confirm-password"></i>
</div>

                <button type="submit" class="login-btn">
                    <span class="btn-text">Sign Up</span>
                    <span class="loading-spinner"></span>
                </button>
                <p class="login-link">
                    Already have an account? <a href="login.html">Login</a>
                </p>
            </form>
        </div>
    </div>
    <script src="signup.js" type="module"></script>
</body>
</html>
