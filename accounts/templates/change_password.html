
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Change Password - ReadWise</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <style>
    .form-card{max-width:420px;margin:48px auto;padding:24px;background:#fff;border-radius:12px;box-shadow:0 6px 24px rgba(0,0,0,.08)}
    .form-card h2{margin:0 0 16px}
    .form-group{margin-bottom:14px}
    .form-group input{width:100%;padding:12px;border:1px solid #ddd;border-radius:8px}
    .btn{display:inline-block;padding:12px 16px;background:#2d6cdf;color:#fff;border:none;border-radius:8px;width:100%}
  </style>
  </head>
<body>
  <div class="form-card">
    <h2><i class="fas fa-key"></i> Change Password</h2>

    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-{{ message.tags }}">{{ message }}</div>
      {% endfor %}
    {% endif %}

    <form method="POST" action="{% url 'change_password' %}">
      {% csrf_token %}
      <div class="form-group">
        <input type="password" name="old_password" placeholder="Current password" required />
      </div>
      <div class="form-group">
        <input type="password" name="new_password" placeholder="New password" required />
      </div>
      <div class="form-group">
        <input type="password" name="confirm_password" placeholder="Confirm new password" required />
      </div>
      <button type="submit" class="btn">Update Password</button>
    </form>
    <p style="margin-top:10px"><a href="{% url 'profile' %}">Back to profile</a></p>
  </div>
  <script src="{% static 'js/script.js' %}"></script>
</body>
</html>
